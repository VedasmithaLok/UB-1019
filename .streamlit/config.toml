[theme]
# Primary color for interactive elements
primaryColor = "#1f77b4"

# Background color for the main content area
backgroundColor = "#ffffff"

# Background color for sidebar
secondaryBackgroundColor = "#f0f2f6"

# Color for text
textColor = "#262730"

# Font family
font = "sans serif"

[server]
# Enable file watcher
fileWatcherType = "auto"

# Max upload size (200MB for X-ray images)
maxUploadSize = 200

[browser]
# Automatically open browser on startup
gatherUsageStats = false
